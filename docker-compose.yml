version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: family_wallet_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: family_wallet
      MYSQL_USER: family_user
      MYSQL_PASSWORD: family_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - family_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: family_wallet_auth
    environment:
      DATABASE_URL: mysql+aiomysql://family_user:family_pass@mysql:3306/family_wallet
      JWT_SECRET_KEY: super_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 30
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your_email@gmail.com
      SMTP_PASSWORD: your_password
      SMTP_FROM: your_email@gmail.com
    ports:
      - "8001:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - family_network
    restart: unless-stopped

  family-service:
    build:
      context: ./family-service
      dockerfile: Dockerfile
    container_name: family_wallet_family
    environment:
      DATABASE_URL: mysql+aiomysql://family_user:family_pass@mysql:3306/family_wallet
      JWT_SECRET_KEY: super_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      AUTH_SERVICE_URL: http://auth-service:8000
    ports:
      - "8002:8000"
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - family_network
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: family_wallet_web
    volumes:
      - ./web:/usr/share/nginx/html:ro
    expose:
      - "80"
    networks:
      - family_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: family_wallet_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - family-service
      - web
    networks:
      - family_network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  family_network:
    driver: bridge
